<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab O' Mine | Login & Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(rgba(46,139,87,0.7), rgba(46,139,87,0.7)),
                        url('IMG_20180502_130146.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .main-title {
            font-size: 4.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.6);
        }

        .sub-title {
            font-size: 1.2rem;
            color: white;
            margin-bottom: 2rem;
        }

        .card {
            border-radius: 20px;
            background: rgba(255,255,255,0.97);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
        }
    </style>
</head>

<body>

<div class="login-container">

    <h1 class="main-title">Lab O' Mine</h1>
    <p class="sub-title">Computer Lab Reservation System</p>

    <div class="card p-4 shadow-lg">

        <ul class="nav nav-tabs mb-4">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#loginView">
                    Login
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#registerView">
                    Register
                </button>
            </li>
        </ul>

        <div class="tab-content">

            <!-- LOGIN TAB -->
            <div class="tab-pane fade show active" id="loginView">

                <form onsubmit="return loginUser(event)">

                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold">DLSU Email</label>
                        <input type="email" id="loginEmail"
                               class="form-control"
                               placeholder="juan_delacruz@dlsu.edu.ph"
                               required>
                    </div>

                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold">Password</label>
                        <div class="password-wrapper">
                            <input type="password"
                                   id="loginPass"
                                   class="form-control"
                                   required>
                            <button type="button"
                                    class="toggle-btn"
                                    onclick="toggleVisibility('loginPass', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-check text-start mb-3">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label small">
                            Remember me
                        </label>
                    </div>

                    <button class="btn btn-success w-100">
                        Sign In
                    </button>

                </form>

            </div>

            <!-- REGISTER TAB -->
            <div class="tab-pane fade" id="registerView">

                <form onsubmit="return registerUser(event)">

                    <div class="mb-2 text-start">
                        <label class="form-label small fw-bold">Full Name</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <div class="mb-2 text-start">
                        <label class="form-label small fw-bold">DLSU Email</label>
                        <input type="email" class="form-control" required>
                    </div>

                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold">Create Password</label>
                        <div class="password-wrapper">
                            <input type="password"
                                   id="regPass"
                                   class="form-control"
                                   required>
                            <button type="button"
                                    class="toggle-btn"
                                    onclick="toggleVisibility('regPass', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button class="btn btn-primary w-100">
                        Create Account
                    </button>

                </form>

            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

// 🔹 Toggle password visibility
function toggleVisibility(id, btn) {
    const field = document.getElementById(id);
    const icon = btn.querySelector("i");

    if (field.type === "password") {
        field.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        field.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}


// 🔥 LOGIN FUNCTION
function loginUser(e) {
    e.preventDefault();

    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPass").value.trim();
    const remember = document.getElementById("rememberMe").checked;

    // 🔐 ADMIN ACCOUNT
    if (email === "admin@dlsu.edu.ph" && password === "admin123") {

        localStorage.setItem("isAdmin", "true");
        localStorage.setItem("currentUser", email);

        if (remember) {
            localStorage.setItem("rememberUser", email);
        }

        window.location.href = "index.html";
        return false;
    }

    // 🎓 STUDENT ACCOUNT
    localStorage.setItem("isAdmin", "false");
    localStorage.setItem("currentUser", email);

    if (remember) {
        localStorage.setItem("rememberUser", email);
    }

    window.location.href = "index.html";
    return false;
}


// 🔹 REGISTER (Simulated)
function registerUser(e) {
    e.preventDefault();
    alert("Registration successful! You may now log in.");
}


// 🔹 Auto-fill remembered user
window.onload = function() {
    const remembered = localStorage.getItem("rememberUser");
    if (remembered) {
        document.getElementById("loginEmail").value = remembered;
        document.getElementById("rememberMe").checked = true;
    }
};

</script>

</body>
</html>
