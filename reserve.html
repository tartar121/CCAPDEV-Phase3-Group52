<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search - Lab O' Mine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style> .nav-green { background-color: #2e8b57 !important; } </style>
    <link rel="icon" type="image/png" href="icon.png">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark nav-green"><div class="container"><a class="navbar-brand" href="index.html">Lab O' Mine</a></div></nav>
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card p-4 shadow-sm">
            <h3>Search Lab Availability</h3>
            <div class="mb-3"><label>Select Lab</label><select id="labSel" class="form-select"><option>Gokongwei 302</option><option>Gokongwei 306</option><option>Velasco 211</option><option>Henry Sy 4th Floor</option><option>Andrew 1401</option></select></div>
            <div class="mb-3"><label>Date</label><input type="date" id="dateIn" class="form-control"></div>
            <button class="btn btn-success w-100" onclick="search()">Search Availability</button>
        </div>
    </div>
    <script>
        $(document).ready(function() {
            const today = new Date().toISOString().split('T')[0];
            const max = new Date(); max.setDate(max.getDate() + 7);
            $('#dateIn').attr('min', today).attr('max', max.toISOString().split('T')[0]).val(today);
        });
        // Search function to redirect to rooms.html with query parameters
        function search() {
            const lab = document.getElementById('labSel').value;
            const date = document.getElementById('dateIn').value; // Expected format: YYYY-MM-DD

            if (!lab || !date) {
                alert("Please select both a laboratory and a date.");
                return;
            }
    
            // Redirect to rooms.html with the search parameters
            window.location.href = `rooms.html?lab=${encodeURIComponent(lab)}&date=${date}`;
        }
    </script>
</body>
</html>
