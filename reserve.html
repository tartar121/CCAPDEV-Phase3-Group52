<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Reservations - Lab O' Mine</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            .user-card { margin-bottom: 15px; }
            .nav-green { background-color: #2e8b57 !important; }
        </style>
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-expand-lg navbar-dark nav-green">
            <div class="container">
                <a class="navbar-brand" href="index.html">Lab O' Mine</a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="profile.html">My Profile</a>
                    <a class="nav-link" href="login.html" style="color: #ffc107;">Sign Out</a>
                    <a class="nav-link" href="reserve.html" style="color: #ffc107;">Reserve</a>
                </div>
            </div>
        </nav>

        <div class = "container mt-4">
            <h2>Reservations</h2>
            <hr>

            <h4>Search Available Rooms</h4>

            <div class="row g-3 mt-2">
                <div class="col-md-3">
                    <label class="form-label">Room</label>
                        <select class="form-select" id="searchRoom">
                        <option value="velasco211">Velasco 211</option>
                        <option value="andrew1401">Andrew 1401</option>
                        <option value="gokongwei302">Gokongwei 302</option>
                        <option value="gokongwei306">Gokongwei 306</option>
                        <option value="henrysy">Henry Sy 4th Floor</option>
                    </select>
                </div>

            <div class="col-md-3">
                <label class="form-label">Date</label>
                <input type="date" class="form-control" id="searchDate">
            </div>

            <div class="col-md-3">
                <label class="form-label">Time</label>
                <input type="time" class="form-control" id="searchTime">
            </div>

            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="searchSlot()">Search</button>
                </div>
            </div>

        <div class="mt-4" id="searchResult"></div>

        <hr>


            <h3>Select a Room</h3>
            <a href="rooms.html?room=Velasco 211" class="btn btn-success mt-2">Velasco 211</a>
            <a href="rooms.html?room=Andrew 1401" class="btn btn-success mt-2">Andrew 1401</a>
            <a href="rooms.html?room=Gokongwei 302" class="btn btn-success mt-2">Gokongwei 302</a>
            <a href="rooms.html?room=Gokongwei 306" class="btn btn-success mt-2">Gokongwei 306</a>
            <a href="rooms.html?room=Henry Sy 4th Floor" class="btn btn-success mt-2">Henry Sy 4th Floor</a>

        </div>

        <script>
        function searchSlot() {
            const room = document.getElementById("searchRoom").value;
            const date = document.getElementById("searchDate").value;
            const time = document.getElementById("searchTime").value;
            const resultDiv = document.getElementById("searchResult");

            if (!room || !date || !time) {
                resultDiv.innerHTML = "<div class='alert alert-danger'>Please fill all fields.</div>";
            } else {

                // To be replaced with DB later :)
                const isAvailable = Math.random() > 0.3;

                if (isAvailable) {
                    resultDiv.innerHTML = `
                        <div class='alert alert-success'>
                            Slot available!<br>
                            <strong>${room}</strong><br>
                            ${date} at ${time}<br>
                            <a href="${room}.html" class="btn btn-sm btn-success mt-2">
                                Reserve Now
                            </a>
                        </div>
                `;
            } else {
                resultDiv.innerHTML =
                    "<div class='alert alert-warning'>Slot already reserved.</div>";
            }
        }
}

</script>




    </body>
</html>
